<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student</title>

<link rel="stylesheet" href="../css/admin.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<!-- ================= SIDEBAR ================= -->
<div class="admin-sidebar">

    <h2>Admin Panel</h2>

    <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
    <a href="students.html"><i class="fas fa-users"></i> Students</a>
    <a href="projects.html"><i class="fas fa-folder"></i> Projects</a>
    <a href="upload.html"><i class="fas fa-upload"></i> Upload</a>
    <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
    <a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a>

</div>
<!-- ================= CONTENT ================= -->
<div class="admin-content">

    <h2>Add New Student</h2>

    <div class="form-box">

        <form>

            <label>Student Name</label>
            <input type="text" placeholder="Enter student name" required>

            <label>Email</label>
            <input type="email" placeholder="Enter email" required>

            <label>Phone</label>
            <input type="text" placeholder="Enter phone number">

            <label>Course</label>
            <input type="text" placeholder="e.g. MS-CIT" required>

            <label>Profile Image</label>
            <input type="file">

            <button type="submit">
                <i class="fas fa-plus"></i> Add Student
            </button>

        </form>

    </div>

</div>

</body>
</html>
