    <div class="form-box">

        <form>

            <!-- Hidden ID (future DB use) -->

            <label>Student Name</label>
            <input type="text" value="Rahul Patil" required>

            <label>Email</label>
            <input type="email" value="rahul@example.com" required>

            <label>Phone</label>
            <input type="text" value="9876543210">

            <label>Course</label>
            <input type="text" value="MS-CIT" required>

            <label>Profile Image</label>
            <input type="file">

            <p style="margin-top:10px; font-size:13px; color:gray;">
                Current Image: profile.jpg
            </p>

            <button type="submit">
                <i class="fas fa-save"></i> Update Student
            </button>

        </form>

    </div>
